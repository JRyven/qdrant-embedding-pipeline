# Database Configuration - Development Environment
# Customize placeholders to match your database setup

database:
  # Connection settings
  host: "[DATABASE_HOST]"
  port: "[DATABASE_PORT]"
  name: "[DATABASE_NAME]"
  
  # Authentication
  username: "[DATABASE_USER]"
  password: "[DATABASE_PASSWORD]"  # Consider using environment variables for production
  
  # Connection pool
  pool:
    min_connections: 5
    max_connections: 20
    idle_timeout: 300
  
  # Logging and debugging
  logging:
    enabled: true
    level: "DEBUG"
    slow_query_threshold_ms: 1000
  
  # SSL/TLS configuration (optional)
  ssl:
    enabled: false
    ca_cert: "[CA_CERT_PATH]"
    verify: false
